<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EoL Quickscan — ABT</title>

<style>
:root{
--dark:#0f172a;
--blue:#1e3a8a;
--accent:#ea580c;
--bg:#f8fafc;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
}

body{
font-family:system-ui,-apple-system;
margin:0;
background:var(--bg);
color:var(--text);
}

.container{
max-width:900px;
margin:auto;
padding:24px;
}

.hero{
background:var(--dark);
color:white;
padding:60px 24px;
}

h1{
font-size:42px;
margin-bottom:12px;
}

.subtitle{
color:#cbd5f5;
max-width:600px;
}

.btn{
background:var(--accent);
color:white;
padding:14px 22px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
border:1px solid var(--border);
border-radius:8px;
padding:20px;
margin-bottom:16px;
}

.hidden{display:none;}

.progress{
height:6px;
background:#e5e7eb;
margin-bottom:20px;
border-radius:4px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:var(--accent);
width:0%;
transition:width .3s;
}

input, select{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid var(--border);
border-radius:6px;
}

.kpi{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:20px;
}

.kpi div{
background:white;
padding:16px;
border-radius:6px;
border:1px solid var(--border);
}

</style>
</head>

<body>

<div class="hero">
<div class="container">
<h1>EoL Quickscan</h1>
<p class="subtitle">
Kwantificeer de restwaarde en herbestemmingspotentie van uw bouwproject — onderbouwd en direct toepasbaar in investeringsbeslissingen.
</p>
<br>
<button class="btn" onclick="start()">Start analyse →</button>
</div>
</div>

<div class="container">

<div id="app" class="hidden">

<div class="progress"><div id="bar" class="progress-bar"></div></div>

<div id="step1" class="card">
<h3>Projectgegevens</h3>
<label>BVO (m²)</label>
<input id="bvo" type="number" placeholder="5000">

<label>CAPEX (€)</label>
<input id="cap" type="number" placeholder="2500000">

<br><br>
<button class="btn" onclick="next(2)">Volgende →</button>
</div>

<div id="step2" class="card hidden">
<h3>Flexibiliteit</h3>
<label>Kolomraster (m²/kolom)</label>
<input id="kol" type="number" value="1500">

<br><br>
<button class="btn" onclick="next(3)">Volgende →</button>
</div>

<div id="step3" class="card hidden">
<h3>Financieel</h3>
<label>Discontovoet (%)</label>
<input id="disc" type="number" value="5">

<br><br>
<button class="btn" onclick="calc()">Bereken →</button>
</div>

<div id="result" class="hidden">

<h2>Resultaat</h2>

<div class="kpi">
<div><strong>EoL score</strong><br><span id="score"></span></div>
<div><strong>NRV (20 jr)</strong><br><span id="nrv"></span></div>
</div>

</div>

</div>
</div>

<script>
let step=1;

function start(){
document.getElementById("app").classList.remove("hidden");
updateBar();
}

function next(n){
document.getElementById("step"+step).classList.add("hidden");
step=n;
document.getElementById("step"+step).classList.remove("hidden");
updateBar();
}

function updateBar(){
document.getElementById("bar").style.width=(step/3*100)+"%";
}

function calc(){
let bvo=+document.getElementById("bvo").value||3000;
let cap=+document.getElementById("cap").value||2000000;
let kol=+document.getElementById("kol").value||1500;
let disc=(+document.getElementById("disc").value||5)/100;

let score=Math.min(20,Math.round(kol/100));
let nrv=(bvo*300*0.3)-(cap*0.04*Math.pow(1+disc,20));

document.getElementById("score").innerText=score+" / 20";
document.getElementById("nrv").innerText="€ "+Math.round(nrv).toLocaleString();

document.getElementById("result").classList.remove("hidden");
updateBar();
}
</script>

</body>
</html>
